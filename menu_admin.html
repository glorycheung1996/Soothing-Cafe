<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店長專用 - 菜單與加購設定</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#F4F7F9] font-sans min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold text-[#2A3B47] mb-6">🛠️ 菜單與加購管理</h1>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
                <h3 class="font-bold mb-4">➕ 新增商品</h3>
                <div class="space-y-4">
                    <input id="new-name" placeholder="商品名稱" class="w-full px-4 py-2 border rounded-xl">
                    <input id="new-price" type="number" placeholder="價格" class="w-full px-4 py-2 border rounded-xl">
                    <input id="new-category" placeholder="商品分類" class="w-full px-4 py-2 border rounded-xl">
                    <input id="new-addon" placeholder="加購分類名稱 (選填)" class="w-full px-4 py-2 border rounded-xl bg-gray-50">
                    <button onclick="addProduct()" class="w-full bg-[#607E96] text-white py-3 rounded-xl font-bold hover:bg-[#4E687D]">儲存至雲端</button>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 lg:col-span-2">
                <table class="w-full text-left text-sm">
                    <thead><tr class="text-gray-400 border-b"><th>名稱</th><th>價格</th><th>分類</th><th>加購分類</th><th>操作</th></tr></thead>
                    <tbody id="product-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://vmrfvymxetydckgzoham.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZtcmZ2eW14ZXR5ZGNrZ3pvaGFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjA3MjIsImV4cCI6MjA5Njk5NjcyMn0.IWCBSsTcdPwaQhHJY1TludpLtnTzO774z4JgMdmveCE";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchProducts() {
            const { data } = await supabaseClient.from('products').select('*').order('id', { ascending: true });
            document.getElementById('product-table-body').innerHTML = data.map(p => `
                <tr class="border-b">
                    <td class="py-3"><input id="name-${p.id}" value="${p.name}" class="w-full border-b"></td>
                    <td class="py-3"><input id="price-${p.id}" value="${p.price}" class="w-12 border-b"></td>
                    <td class="py-3"><input id="cat-${p.id}" value="${p.category}" class="w-20 border-b"></td>
                    <td class="py-3"><input id="addon-${p.id}" value="${p.add_on_type || ''}" class="w-20 border-b bg-gray-50"></td>
                    <td class="py-3"><button onclick="updateProduct(${p.id})" class="text-[#607E96] font-bold">儲存</button></td>
                </tr>
            `).join('');
        }

        async function addProduct() {
            await supabaseClient.from('products').insert([{ 
                name: document.getElementById('new-name').value,
                price: document.getElementById('new-price').value,
                category: document.getElementById('new-category').value,
                add_on_type: document.getElementById('new-addon').value || null
            }]);
            fetchProducts();
        }

        async function updateProduct(id) {
            await supabaseClient.from('products').update({ 
                name: document.getElementById(`name-${id}`).value,
                price: document.getElementById(`price-${id}`).value,
                category: document.getElementById(`cat-${id}`).value,
                add_on_type: document.getElementById(`addon-${id}`).value || null
            }).eq('id', id);
            alert("已更新！");
            fetchProducts();
        }
        fetchProducts();
    </script>
</body>
</html>
