<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店長專用 - 雲端菜單管理後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#F4F7F9] font-sans min-h-screen p-6">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div>
                <h1 class="text-2xl font-bold text-[#2A3B47]">🛠️ 店長專用：雲端菜單管理後台</h1>
                <p class="text-sm text-gray-400 mt-1">即時修改商品、調整價格、設定分類與售完狀態</p>
            </div>
            <a href="dashboard.html" class="text-sm bg-gray-100 text-gray-600 px-4 py-2 rounded-xl font-medium hover:bg-gray-200">📊 前往發財儀表板</a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
                <h3 class="text-lg font-bold text-[#2A3B47] mb-4">➕ 新增商品</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-500 mb-1">商品名稱</label>
                        <input id="new-name" type="text" placeholder="例如：拿鐵咖啡" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-[#607E96]">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-500 mb-1">價格</label>
                        <input id="new-price" type="number" placeholder="例如：120" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-[#607E96]">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-500 mb-1">商品分類 (自由輸入)</label>
                        <input id="new-category" type="text" placeholder="例如：咖啡飲品" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:outline-none focus:border-[#607E96]">
                    </div>
                    <button onclick="addProduct()" class="w-full bg-[#607E96] text-white py-3 rounded-xl font-bold hover:bg-[#4E687D] transition shadow-md">
                        🚀 儲存至雲端
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 lg:col-span-2">
                <table class="w-full text-left">
                    <tbody id="product-table-body" class="divide-y divide-gray-50">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://vmrfvymxetydckgzoham.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZtcmZ2eW14ZXR5ZGNrZ3pvaGFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjA3MjIsImV4cCI6MjA5Njk5NjcyMn0.IWCBSsTcdPwaQhHJY1TludpLtnTzO774z4JgMdmveCE";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchProducts() {
            const { data } = await supabaseClient.from('products').select('*').order('id', { ascending: true });
            const tbody = document.getElementById('product-table-body');
            tbody.innerHTML = data.map(p => `
                <tr class="text-gray-700">
                    <td class="py-3"><input id="name-${p.id}" value="${p.name}" class="w-full px-1 border-b focus:border-[#607E96]"></td>
                    <td class="py-3"><input id="price-${p.id}" value="${p.price}" class="w-16 px-1 border-b focus:border-[#607E96]"></td>
                    <td class="py-3"><input id="cat-${p.id}" value="${p.category}" class="w-24 px-1 border-b focus:border-[#607E96]"></td>
                    <td class="py-3 text-center">
                        <input id="sold-${p.id}" type="checkbox" ${p.is_sold_out?'checked':''}>
                    </td>
                    <td class="py-3 text-center">
                        <button onclick="updateProduct(${p.id})" class="text-xs bg-[#607E96]/10 text-[#607E96] font-bold px-3 py-1 rounded-lg">儲存</button>
                    </td>
                </tr>
            `).join('');
        }

        async function addProduct() {
            const name = document.getElementById('new-name').value;
            const price = document.getElementById('new-price').value;
            const category = document.getElementById('new-category').value || '其他';
            
            await supabaseClient.from('products').insert([{ name, price, category }]);
            alert("新增成功！");
            fetchProducts();
        }

        async function updateProduct(id) {
            const name = document.getElementById(`name-${id}`).value;
            const price = document.getElementById(`price-${id}`).value;
            const category = document.getElementById(`cat-${id}`).value;
            const is_sold_out = document.getElementById(`sold-${id}`).checked;

            await supabaseClient.from('products').update({ name, price, category, is_sold_out }).eq('id', id);
            alert("已儲存！");
            fetchProducts();
        }

        fetchProducts();
    </script>
</body>
</html>
